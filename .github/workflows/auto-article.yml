name: Auto Article Generation

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 00:00 JST (= 15:00 UTC)
  workflow_dispatch:        # 手動実行用

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate new article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "新規記事なし（スキップ）"
          else
            TITLE=$(cat "$GITHUB_OUTPUT" 2>/dev/null | grep '^title=' | cut -d= -f2- || echo "auto")
            git commit -m "feat: 自動記事追加 $(date +%Y-%m-%d) — ${TITLE}"
            git push
          fi
