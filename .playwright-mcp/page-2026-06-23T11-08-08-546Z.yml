          - generic [ref=e53]:
            - generic [ref=e54]:
              - paragraph [ref=e55]: コンテンツの売上金額から、下記の計算方法に基づくサービス利用料及び振込手数料を差し引いた金額をお振込みいたします。
              - heading "noteに関するサービス利用料の計算方法" [level=2] [ref=e56]
              - heading "事務手数料" [level=4] [ref=e57]:
                - strong [ref=e58]: 事務手数料
              - paragraph [ref=e59]:
                - text: コンテンツの決済手段により以下の料率を乗じた額を差し引きます。
                - text: クリエイターご自身が登録されている決済手段ではなく、購読者の決済手段によります。
              - table [ref=e60]:
                - rowgroup [ref=e61]:
                  - row "決済手段 売上金額に対する事務手数料の割合" [ref=e62]:
                    - columnheader "決済手段" [ref=e63]
                    - columnheader "売上金額に対する事務手数料の割合" [ref=e64]
                - rowgroup [ref=e65]:
                  - row "クレジットカード決済 5%" [ref=e66]:
                    - cell "クレジットカード決済" [ref=e67]
                    - cell "5%" [ref=e68]
                  - row "携帯キャリア決済 15%" [ref=e69]:
                    - cell "携帯キャリア決済" [ref=e70]
                    - cell "15%" [ref=e71]
                  - row "PayPay決済 7%" [ref=e72]:
                    - cell "PayPay決済" [ref=e73]
                    - cell "7%" [ref=e74]
                  - row "Amazon Pay決済 7％" [ref=e75]:
                    - cell "Amazon Pay決済" [ref=e76]
                    - cell "7％" [ref=e77]
                  - row "noteポイントでの決済 10%" [ref=e78]:
                    - cell "noteポイントでの決済" [ref=e79]
                    - cell "10%" [ref=e80]
                  - row "PayPal決済 6.5%" [ref=e81]:
                    - cell "PayPal決済" [ref=e82]
                    - cell "6.5%" [ref=e83]
              - heading "プラットフォーム利用料" [level=4] [ref=e84]:
                - strong [ref=e85]: プラットフォーム利用料
              - paragraph [ref=e86]:
                - text: 売上金額から事務手数料を引いた金額に以下の料率を乗じた額を差し引きます。
                - text: 有料記事、有料マガジン、チップ ( サポート )、メンバーシップ：10%
                - text: 定期購読マガジン：20%
              - generic [ref=e87]:
                - text: 
                - paragraph [ref=e88]:
                  - text: 事務手数料とプラットフォーム手数料は、
                  - strong [ref=e89]: 決済(購入)ごと
                  - text: に発生します。
              - heading "振込手数料（売上金のお支払い1回あたり1回のみ発生）" [level=4] [ref=e90]:
                - strong [ref=e91]: 振込手数料（売上金のお支払い1回あたり1回のみ発生）
                - strong
              - paragraph [ref=e92]: 270円
              - generic [ref=e93]:
                - text: 
                - paragraph [ref=e94]:
                  - text: 振込手数料は、
                  - strong [ref=e95]: 1回の振込あたり1回のみ
                  - text: 発生します。
              - heading "計算方法の例①" [level=2] [ref=e96]
              - paragraph [ref=e97]: 1,000円の有料記事がクレジットカード決済で購入された場合
              - paragraph [ref=e98]:
                - strong [ref=e99]: ① 事務手数料 ＝ コンテンツの売上金額 × 5％（小数点以下切り捨て）
                - text: 1,000円 × 5％ ＝ 50円
              - paragraph [ref=e100]:
                - strong [ref=e101]: ② プラットフォーム利用料 ＝（コンテンツの売上金額 ー 事務手数料）× 10％（小数点以下切り捨て）
                - text: （1,000円 ー 50円）× 10％ ＝ 95円
              - paragraph [ref=e102]:
                - strong [ref=e103]: サービス利用料
                - text: 50円（①） + 95円（②） = 145円
              - paragraph [ref=e104]:
                - text: 振込金額 ＝ 売上金額 －（サービス利用料 + 振込手数料）
                - text: 1,000円 ー（145円 + 270円）＝ 585円
              - heading "計算方法の例②" [level=2] [ref=e105]
              - paragraph [ref=e106]: 1,000円の有料記事が、クレジットカードで2件、キャリア決済で1件、PayPay決済で1件の、合計4件購入された場合
              - paragraph [ref=e107]:
                - strong [ref=e108]: ① 事務手数料 ＝ コンテンツの売上金額 × 5％
                - text: （小数点以下切り捨て）
                - text: "クレジットカード決済: 1,000円 × 2件 × 5％ ＝ 100円"
                - text: "キャリア決済: 1,000円 × 15% ＝ 150円"
                - text: "PayPay決済: 1,000円 × 7% ＝70円"
                - text: ※上記合計320円
              - paragraph [ref=e109]:
                - strong [ref=e110]: ② プラットフォーム利用料 ＝（コンテンツの売上金額 ー 事務手数料）× 10％（小数点以下切り捨て）
                - text: （1,000円 × 4件 ー 100円 ー 150円 ー 70円）× 10％ ＝ 368円
              - paragraph [ref=e111]:
                - strong [ref=e112]: サービス利用料
                - text: 320円（①） + 368円（②） = 688円
              - paragraph [ref=e113]:
                - text: 振込金額 ＝ 売上金額 －（サービス利用料 + 振込手数料）
                - text: 1,000円 × 4件 ー（688円 + 270円）＝ 3042円
